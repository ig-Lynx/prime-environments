name: Publish Envs to Community

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'environments/**'

jobs:
  detect-envs:
    name: Detect Community Envs to Publish
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_envs: ${{ steps.set-matrix.outputs.has_envs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Publish Matrix
        id: set-matrix
        run: |
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.event.after }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [[ "$BASE_SHA" =~ ^0+$ ]]; then
            # For manual runs or zero-SHA (first push), publish all environments
            ENV_IDS=$(find environments -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | jq -R . | jq -sc .)
          else
            # For pushes, only publish changed environments
            ENV_IDS=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- environments | \
              awk -F'/' 'NF > 1 { print $2 }' | \
              sort -u | \
              jq -R . | jq -sc .)
          fi

          if [ "$ENV_IDS" = "[]" ] || [ "$ENV_IDS" = "null" ] || [ -z "$ENV_IDS" ]; then
            echo "No community envs to publish"
            echo "has_envs=false" >> $GITHUB_OUTPUT
            echo "matrix={\"env_id\":[]}" >> $GITHUB_OUTPUT
          else
            echo "Community envs to publish: $ENV_IDS"
            echo "has_envs=true" >> $GITHUB_OUTPUT
            echo "matrix={\"env_id\":$ENV_IDS}" >> $GITHUB_OUTPUT
          fi

  publish-envs:
    name: "Publish Community Env: ${{ matrix.env_id }}"
    needs: detect-envs
    if: needs.detect-envs.outputs.has_envs == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.detect-envs.outputs.matrix) }}
    env:
      PRIME_ENVS_API_KEY: ${{ secrets.PRIME_API_KEY }}
      PRIME_EVALS_API_KEY: ${{ secrets.PRIME_EVALS_API_KEY || secrets.PRIME_API_KEY }}
      PRIME_TEAM_ID: ${{ secrets.PRIME_TEAM_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install prime
        run: uv tool install "prime==0.5.45"

      - name: Publish Environment to Community
        env:
          ENV_ID: ${{ matrix.env_id }}
          PRIME_API_KEY: ${{ env.PRIME_ENVS_API_KEY }}
        run: |
          echo "Publishing community env: $ENV_ID"
          if [ ! -d "environments/$ENV_ID" ]; then
            echo "⚠ Community env $ENV_ID no longer exists - skipping"
            exit 0
          fi

          set +e
          output=$(prime env push -p "environments/$ENV_ID" --visibility PUBLIC 2>&1)
          exit_code=$?
          echo "$output"
          set -e

          # Check if this is just an unchanged content hash (not a real failure)
          if echo "$output" | grep -qi "content hash.*already exists\|already exists with the same content"; then
            echo "⚠ Community env $ENV_ID unchanged - skipping (content hash already exists)"
            exit 0
          elif [ $exit_code -eq 0 ]; then
            echo "✓ Successfully published community env $ENV_ID"
            exit 0
          else
            echo "✗ Failed to publish community env $ENV_ID"
            exit 1
          fi

      - name: Push Eval Outputs to Community
        if: ${{ github.run_attempt == 1 }}
        env:
          ENV_ID: ${{ matrix.env_id }}
          PRIME_API_KEY: ${{ env.PRIME_EVALS_API_KEY }}
        run: |
          if [ ! -d "environments/$ENV_ID/outputs/evals" ]; then
            echo "No eval outputs for $ENV_ID - skipping"
            exit 0
          fi

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.event.after }}"
          EVENT_NAME="${{ github.event_name }}"

          ENV_SLUG=$(python3 - <<'PY'
          import os
          import tomllib

          env_dir = os.environ["ENV_ID"]
          with open(f"environments/{env_dir}/pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["name"])
          PY
          )

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            MANUAL_BASE_SHA=$(git rev-parse HEAD^ 2>/dev/null || echo "")
            if [ -z "$MANUAL_BASE_SHA" ]; then
              EVAL_DIRS=$(find "environments/$ENV_ID/outputs/evals" -type f \( -name metadata.json -o -name results.jsonl \) | \
                awk -F'/' 'NF > 1 { path=$0; sub(/\/[^\/]+$/, "", path); print path }' | \
                sort -u || true)
            else
              EVAL_DIRS=$(git diff --name-status "$MANUAL_BASE_SHA" HEAD -- "environments/$ENV_ID/outputs/evals" | \
                awk -F'\t' '$1 == "A" { path=$2; sub(/\/[^\/]+$/, "", path); print path }' | \
                sort -u || true)
            fi
          elif [[ "$BASE_SHA" =~ ^0+$ ]]; then
            EVAL_DIRS=$(find "environments/$ENV_ID/outputs/evals" -type f \( -name metadata.json -o -name results.jsonl \) | \
              awk -F'/' 'NF > 1 { path=$0; sub(/\/[^\/]+$/, "", path); print path }' | \
              sort -u || true)
          else
            EVAL_DIRS=$(git diff --name-status "$BASE_SHA" "$HEAD_SHA" -- "environments/$ENV_ID/outputs/evals" | \
              awk -F'\t' '$1 == "A" { path=$2; sub(/\/[^\/]+$/, "", path); print path }' | \
              sort -u || true)
          fi

          if [ -z "$EVAL_DIRS" ]; then
            echo "No newly added eval outputs for $ENV_ID - skipping"
            exit 0
          fi

          while read -r eval_dir; do
            if [ ! -d "$eval_dir" ]; then
              echo "Skipping missing eval dir: $eval_dir"
              continue
            fi
            if [ ! -f "$eval_dir/metadata.json" ] || [ ! -f "$eval_dir/results.jsonl" ]; then
              echo "Skipping incomplete eval dir: $eval_dir"
              continue
            fi
            echo "Pushing public eval: $eval_dir"
            prime eval push "$eval_dir" --env "prime-community/$ENV_SLUG" --public || exit 1
            sleep 1
          done < <(printf '%s\n' "$EVAL_DIRS")
